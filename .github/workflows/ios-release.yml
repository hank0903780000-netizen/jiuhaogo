name: iOS 正式簽章上傳 TestFlight

# 手動觸發：到 GitHub 網站 Actions 分頁點「Run workflow」才會執行，
# 避免每次 push 都不小心送出一次 TestFlight 版本。
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios-app
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 npm 套件
        run: npm install

      - name: 同步 Capacitor（把網頁內容更新進 iOS 專案）
        run: npx cap sync ios

      - name: 安裝 CocoaPods 依賴
        working-directory: ios-app/ios/App
        run: pod install

      # ── 憑證安裝：採用 GitHub 官方文件的標準做法 ──────────────
      # 用「手動準備好的憑證」直接匯入暫時鑰匙圈，不透過 Apple 自動建立，
      # 這樣完全不會再觸發「需要註冊裝置」的檢查。
      - name: 安裝簽章憑證與 Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          # 這兩組密碼只是用來解鎖「本來就只存在 GitHub Secrets 裡」的檔案，
          # 檔案本身不公開，密碼寫死在這裡不影響安全性，省去使用者手動設定的步驟。
          P12_PASSWORD: "JiuHaoGo2026Sign"
          KEYCHAIN_PASSWORD: "JiuHaoGoCI2026"
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "❌ 有一筆 GitHub Secret 是空的，請檢查 BUILD_CERTIFICATE_BASE64／BUILD_PROVISION_PROFILE_BASE64"
            exit 1
          fi

          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # 建立暫時鑰匙圈，只在這次建置中使用
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "✅ 憑證與 Profile 已安裝"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: 封存（Archive，正式簽章・手動指定憑證）
        working-directory: ios-app/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="JiuHaoGo AppStore" \
            DEVELOPMENT_TEAM=XUKUDKLGZA \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: 匯出 .ipa
        working-directory: ios-app/ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: 放置 App Store Connect API 金鑰（上傳用）
        working-directory: ios-app/ios/App
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          printf '%s\n' "$ASC_KEY_P8" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: 上傳到 TestFlight
        working-directory: ios-app/ios/App
        run: |
          xcrun altool --upload-app \
            --type ios \
            -f build/export/*.ipa \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }}

      - name: 上傳 .ipa 供備查
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JiuHaoGo-release-ipa
          path: ios-app/ios/App/build/export/*.ipa
          retention-days: 30

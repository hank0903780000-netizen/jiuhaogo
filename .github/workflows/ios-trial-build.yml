name: iOS 試組建（模擬器，免簽章）

on:
  workflow_dispatch:
  push:
    paths:
      - "ios-app/**"
      - ".github/workflows/ios-trial-build.yml"

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-app
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 npm 套件
        run: npm install

      - name: 同步 Capacitor（把網頁內容更新進 iOS 專案）
        run: npx cap sync ios

      - name: 安裝 CocoaPods 依賴
        working-directory: ios-app/ios/App
        run: pod install

      - name: 編譯給 iOS 模擬器（不需要 Apple 開發者帳號簽章）
        working-directory: ios-app/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: 打包 .app 供下載檢視
        working-directory: ios-app/ios/App
        run: |
          ls -la build/Build/Products/Debug-iphonesimulator/
          cd build/Build/Products/Debug-iphonesimulator
          zip -r "$GITHUB_WORKSPACE/JiuHaoGo-simulator-build.zip" ./App.app

      - name: 上傳建置結果
        uses: actions/upload-artifact@v4
        with:
          name: JiuHaoGo-iOS-Simulator-Build
          path: JiuHaoGo-simulator-build.zip
          retention-days: 14
